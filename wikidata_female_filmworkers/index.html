<body style='margin: 0;padding: 0'>

  <center>
 
    <div style="padding-top:100;padding-bottom:100;width:1500;align-content: left;display:flex">
      <tspan class="title">
        Finding<br> Female<br> Filmworkers<br> in Wikidata<br>
      </tspan>
    </div>

    <div id="menu" style="width:1500;align-content: left;display:flex"><select id="selectButton"></select></div>
    <div id="graph" style=""></div>
    <div style="padding-top:10;padding-bottom:10;width:1500;align-content: left;display:flex">
      <tspan class="author">
        This visualisation illustrates discussion sourrounding the representation of female filmworker data on Wikidata.More information can be found at <a href="https://github.com/paulduchesne/wikidata-female-filmworkers">https://github.com/paulduchesne/wikidata-female-filmworkers</a>. 
      </tspan>
    </div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>

      async function load_csv(path) {

        return d3.csv(path);

      }

      async function random_numb() {
  return Math.random();
}

      async function knots(datum) {

        var allGroup = [
          "Wikidata film editing by year of film release.",
          "Wikidata film editor by age of first credit.",
          "Wikidata film editor by length of career.",
          "Wikidata film editor by Bechdel test of film.",
          "Wikidata film editor by country of production.",
          "Wikidata gender information by source.",
        ]

        // add the options to the button
        d3.select("#selectButton")
          .selectAll('myOptions')
          .data(allGroup)
          .enter()
          .append('option')
          .text(function (d) { return d; }) // text showed in the menu
          .attr("value", function (d) { return d; }) // corresponding value returned by the button

        d3.select("#selectButton").on("change", function (d) {
          var selectedOption = d3.select(this).property("value")
          if (selectedOption == "Wikidata film editing by year of film release.") {
            d3.selectAll('.axises').remove()
            d3.selectAll('.rounds').transition().duration(1000).attr("cx", d => release_scale(new Date(Date.parse(d.release))))
            d3.select(".graphic")
              .append("g")
              .attr('class', 'axises')
              .attr("transform", `translate(0, 50)`)
              .call(d3.axisTop(release_scale)
              .tickSizeOuter(0));
            }
          if (selectedOption == "Wikidata film editor by age of first credit.") {
            d3.selectAll('.axises').remove()
            d3.selectAll('.rounds').transition().duration(1000).attr("cx", d => age_scale(+d.age))
            d3.select(".graphic")
              .append("g")
              .attr('class', 'axises')
              .attr("transform", `translate(0, 50)`)
              .call(d3.axisTop(age_scale)
              .tickSizeOuter(0));
            }
          if (selectedOption == "Wikidata gender information by source.") {
            d3.selectAll('.axises').remove()
            d3.selectAll('.rounds').transition().duration(1000).attr("cx", d => source_scale(d.source)+(Math.random()*100)-50)
            d3.select(".graphic")
              .append("g")
              .attr('class', 'axises')
              .attr("transform", `translate(0, 50)`)
              .call(d3.axisTop(source_scale)
              .tickSizeOuter(0));
            }
          if (selectedOption == "Wikidata film editor by length of career.") {
            d3.selectAll('.axises').remove()
            d3.selectAll('.rounds').transition().duration(1000).attr("cx", d => career_scale(d.career_length))
            d3.select(".graphic")
              .append("g")
              .attr('class', 'axises')
              .attr("transform", `translate(0, 50)`)
              .call(d3.axisTop(career_scale)
              .tickSizeOuter(0));
            }  
          if (selectedOption == "Wikidata film editor by country of production.") {
            d3.selectAll('.axises').remove()
            d3.selectAll('.rounds').transition().duration(1000).attr("cx", d => country_scale(d.countryLabel)+(Math.random()*100)-50)
            d3.select(".graphic")
              .append("g")
              .attr('class', 'axises')
              .attr("transform", `translate(0, 50)`)
              .call(d3.axisTop(country_scale)
              .tickSizeOuter(0));
            }
          if (selectedOption == "Wikidata film editor by Bechdel test of film.") {
            d3.selectAll('.axises').remove()
            d3.selectAll('.rounds').transition().duration(1000).attr("cx", d => {return bechdel_scale(d.bechdelLabel)+(Math.random()*100)-50})
            d3.select(".graphic")
              .append("g")
              .attr('class', 'axises')
              .attr("transform", `translate(0, 50)`)
              .call(d3.axisTop(bechdel_scale)
              .tickSizeOuter(0));
            }
        })

        let people = [...new Set(datum.map(d => (d.editor)))];
        let ages = [...new Set(datum.map(d => (+d.age)))];
        let careers = [...new Set(datum.map(d => (+d.career_length)))];
        let countries = [...new Set(datum.map(d => (d.countryLabel)))].sort();
        let bechdels = [...new Set(datum.map(d => (d.bechdelLabel)))];
        let gender = [...new Set(datum.map(d => (d.gender_label)))];
        let sources = [...new Set(datum.map(d => (d.source)))].sort();
        let release_values = [...new Set(datum.map(d => (new Date(Date.parse(d.release)))))];

        let y_scale = d3.scaleBand()
          .domain(people)
          .range([100, 900])
          .padding([0.2])

        let x_left = 100
        let x_right = 1700-100

        let source_scale = d3.scalePoint()
          .domain(sources)
          .range([x_left, x_right])

        let country_scale = d3.scalePoint()
          .domain(countries)
          .range([x_left, x_right])

        let bechdel_scale = d3.scalePoint()
          .domain(bechdels)
          .range([x_left, x_right])

        let release_scale = d3.scaleTime()
          .domain([d3.min(release_values), d3.max(release_values)])
          .range([x_left, x_right]).nice()

        let age_scale = d3.scaleLinear()
          .domain([0, d3.max(ages)])
          .range([x_left, x_right]).nice()

        let career_scale = d3.scaleLinear()
          .domain([0, d3.max(careers)])
          .range([x_left, x_right]).nice()

        d3.selectAll("#graph")
          .append("svg")
          .attr("class", "graphic")
          .attr("id", "rounds")
          .attr("width", "1700")
          .attr("height", "950")
          .style("background-color", '#E6EBE0')

        d3.select(".graphic")
          .selectAll("g")
          .data(datum)
          .join("circle")
          .attr('class', 'rounds')
          .attr("cx", d => release_scale(new Date(Date.parse(d.release))))
          .attr("cy", d => y_scale(d.editor))
          .attr('r', 3)
          .style('fill', d => { if (d.gender_label == 'male') { return '#36C9C6' } else if (d.gender_label == 'female') { return '#ED6A5A' } else { return "#9BC1BC" } })
          .style('stroke-width', '0px')
          .style('opacity', 0.4)
          .on('mouseover', function (k, d) {
            d3.select('#caption').transition().duration(500).style('opacity', 1)
            d3.select('#caption').attr('x', d3.select(this).attr('cx')).attr('y', d3.select(this).attr('cy'))
              .text(d.film_label + ' // ' + d.editor_label)
            console.log(d3.select(this).attr('r', 20));
          })
          .on('mouseout', function (k, d) {
            d3.select(this).attr('r', 2)
            d3.select('#caption').transition().duration(500).style('opacity', 0)
          })

        d3.select(".graphic")
          .append("text")
          .attr('id', 'caption')
          .attr('x', 100)
          .attr('y', 100)
          .text('hello')
          .style("pointer-events", "none")
          .attr('dominant-baseline', 'center')

        d3.select(".graphic")
          .append("g")
          .attr('class', 'axises')
          .attr("transform", `translate(0, 50)`)
          .call(d3.axisTop(release_scale)
          .tickSizeOuter(0));

        d3.select(".graphic")
          .append("line")


          .attr('x1', 100)
          .attr('x2', 1700-100)

          .attr('y1', 950)
          .attr('y2', 950)

          .style('fill', 'black')
          .style('stroke', 'black')
          .style('stroke-width', '4px')
 

      }

      async function render_page() {

        const data = await load_csv("./test_data.csv")
        knots(data)

        // things which need to be fixed - tooltip formatting, also what it displays
        // work + editor makes sense for year of release, not for age of first film

        // speciifcially source table needs percentages in labels + None needs to be explicitly satted

        // point scale charts can blow out

        // four divs - header, menu, graphic, footer

        // you need a wdier margin on the sides of the graph

      }

      render_page();

    </script>
</body>

</html>
